name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          diff=$(gofmt -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "::error::gofmt found formatting differences. Run 'gofmt -w .'"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: go test -race
        run: go test -race ./...
