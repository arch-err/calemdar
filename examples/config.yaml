# cale**md**ar config — copy to $XDG_CONFIG_HOME/calemdar/config.yaml
# (typically ~/.config/calemdar/config.yaml)
#
# All fields are optional; missing keys fall back to the defaults shown here.
# CLI --vault and $CALEMDAR_VAULT still override the vault key below.

# Required for the daemon — path to your Obsidian vault. ~/ is expanded.
vault: /home/you/path/to/vault

# Optional subfolder (relative to vault) to house the calendar tree.
# Empty = at vault root. Useful if your vault already has a structure
# and you want calendar data tucked away, e.g. "02 - Personal/Calendar".
base_path: ""

# IANA timezone name. Controls "today" resolution and the nightly timer.
timezone: Europe/Stockholm

# When the nightly reconcile + archive pass runs (HH:MM, 24h, in `timezone`).
nightly_at: "03:00"

# How many months of events to keep materialised ahead of today.
horizon_months: 12

# Events older than (today - this many months) are moved to archive/.
archive_cutoff_months: 6

# How long to coalesce rapid-fire filesystem events per path, in ms.
debounce_ms: 500

# Calendar subfolders. One Full Calendar source per name, one color each.
calendars:
  - health
  - tech
  - work
  - life
  - friends-family
  - special

# Per-event notifications. Per-event rules live in event/root frontmatter
# as a `notify:` list (see docs/schema.md). This block governs the
# daemon side: which backends are available, scheduler cadence, the
# action runner.
notifications:
  enabled: false

  # Scheduler cadence. 1m is a good default. Below 30s is rejected.
  tick_interval: 1m

  # Caps the longest per-rule lead the scheduler will honour.
  # Hard ceiling: 24h.
  max_lead: 23h

  # Caps the action runner's parallelism.
  max_concurrent_spawns: 4

  # Restrict the scheduler to events in these calendars. Empty = all.
  calendars: []

  backends:
    # Linux desktop notifications via notify-send.
    system:
      enabled: false
      # binary_path: /usr/bin/notify-send
      # urgency: low      # low | normal | critical

    # ntfy.sh / self-hosted ntfy.
    ntfy:
      enabled: false
      # url: https://ntfy.sh
      # topic: my-private-calemdar-topic

  # Action runner. Disabled by default — vault frontmatter cannot fire
  # scripts unless you opt in. See docs/actions.md.
  actions:
    enabled: false
    # config_path: ~/.config/calemdar/actions.yaml
